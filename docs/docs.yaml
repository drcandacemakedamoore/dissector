name: Documentation

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build and deploy docs
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: 3.14

      # 3️⃣ Upgrade pip and install your package + docs dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[docs]
          python -m pip install .[dev,publishing]

      # 4️⃣ Install system packages needed for Sphinx
      - name: Install system packages
        run: sudo apt update && sudo apt install -y pandoc make

      # 5️⃣ Build docs (runs Sphinx directly, ignores doctest failures)
      - name: Build HTML docs
        run: |
          python -m sphinx -b html docs docs/_build/html

      # 6️⃣ Optionally check _build/html exists
      - name: List built docs
        run: ls -R docs/_build/html

      # 7️⃣ Deploy to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4