name: documentation

on:
  push:
    branches:
    - main
    - develop
  pull_request:
    branches:
    - main
    - develop

jobs:
  build-documentation:
    name: Build documentation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: 3.14
      - name: Python info
        shell: bash -e {0}
        run: |
          which python
          python --version
      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip setuptools
          python -m pip install -e .[docs]
          python -m pip install .[dev,publishing]
          python -m pip install sphinx sphinx-autoapi sphinx-rtd-theme myst-parser
      - name: Install pandoc using apt
        run: sudo apt install pandoc     
      - name: Install build tools
        run: sudo apt update && sudo apt install -y make  
      - name: Build documentation
        run: make coverage doctest html
        working-directory: docs
            # 7️⃣ Check _build/html exists
      - name: List built docs
        run: ls -R docs/_build/html

      # 8️⃣ Deploy to GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        permissions: id-token: write contents: read
        # with:
        #   environment: github-pages
        # with:
        #   token: ${{ secrets.PAGES_PAT }}
      
